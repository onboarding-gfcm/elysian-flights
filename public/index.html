<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Élysian Flights — Premium Travel Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#B8945F;--gold-l:#D4B07A;--gold-d:#9A7A4A;
      --bg:#09090B;--card:#111113;--card2:#18181B;--card-h:#1C1C1F;
      --brd:#27272A;--brd-l:#3F3F46;
      --txt:#FAFAFA;--txt2:#A1A1AA;--txt3:#71717A;--txt4:#52525B;
      --grn:#22C55E;--grn-bg:rgba(34,197,94,.1);
      --red:#EF4444;--wa:#25D366;
      --r:12px;
    }
    body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased}
    .serif{font-family:'DM Serif Display',serif}
    .hidden{display:none!important}

    /* HEADER */
    header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,11,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--brd)}
    .h-in{max-width:1200px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-size:20px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
    .logo-icon{width:32px;height:32px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
    .logo b{color:var(--gold)}
    nav a{color:var(--txt3);text-decoration:none;font-size:13px;font-weight:500;margin-left:32px;transition:.2s}
    nav a:hover{color:var(--txt)}

    /* HERO */
    .hero{padding:140px 32px 100px;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(184,148,95,.08) 0%,transparent 60%)}
    .hero-tag{display:inline-block;padding:6px 16px;border:1px solid var(--brd);border-radius:20px;font-size:12px;color:var(--txt3);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
    .hero h1{font-size:clamp(32px,5vw,56px);font-weight:300;letter-spacing:-0.5px;margin-bottom:12px;line-height:1.15}
    .hero h1 em{font-style:normal;color:var(--gold);font-weight:400}
    .hero p{font-size:17px;color:var(--txt3);max-width:480px;margin:0 auto}

    /* SEARCH */
    .search-w{max-width:1000px;margin:-48px auto 0;padding:0 20px;position:relative;z-index:10}
    .search-card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:28px 32px;box-shadow:0 24px 64px rgba(0,0,0,.4)}
    .trip-tog{display:flex;gap:6px;margin-bottom:20px}
    .trip-tog button{background:transparent;border:1px solid var(--brd);color:var(--txt3);padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:.2s}
    .trip-tog button.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}
    .s-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:12px;align-items:end}
    .fld{position:relative}
    .fld label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px}
    .fld input{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;color:var(--txt);font-family:inherit;font-size:14px;outline:none;transition:.2s}
    .fld input:focus{border-color:var(--gold)}
    .fld input::placeholder{color:var(--txt4)}

    /* Airport Autocomplete Dropdown */
    .ap-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--brd-l);border-radius:10px;margin-top:4px;max-height:280px;overflow-y:auto;z-index:200;display:none;box-shadow:0 16px 48px rgba(0,0,0,.5)}
    .ap-dropdown.show{display:block}
    .ap-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--brd)}
    .ap-item:last-child{border-bottom:none}
    .ap-item:hover,.ap-item.active{background:var(--card-h)}
    .ap-icon{width:32px;height:32px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
    .ap-info{flex:1;min-width:0}
    .ap-name{font-size:14px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ap-city{font-size:12px;color:var(--txt3)}
    .ap-code{font-size:13px;font-weight:600;color:var(--gold);flex-shrink:0;letter-spacing:.5px}
    .ap-dropdown::-webkit-scrollbar{width:6px}
    .ap-dropdown::-webkit-scrollbar-track{background:transparent}
    .ap-dropdown::-webkit-scrollbar-thumb{background:var(--brd-l);border-radius:3px}

    .btn-s{background:var(--gold);color:var(--bg);border:none;border-radius:8px;padding:12px 28px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
    .btn-s:hover{background:var(--gold-l);transform:translateY(-1px)}
    .btn-s:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* RESULTS */
    .res-w{max-width:1000px;margin:40px auto;padding:0 20px}
    .res-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .res-h h2{font-size:24px;font-weight:400}
    .res-h h2 em{font-style:normal;color:var(--gold)}
    .res-cnt{color:var(--txt3);font-size:13px}

    /* STEPS */
    .steps{display:flex;align-items:center;gap:8px;margin-bottom:28px}
    .stp{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--txt4)}
    .stp.on{color:var(--gold)}.stp.done{color:var(--grn)}
    .stp-num{width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
    .stp.done .stp-num{background:var(--grn);border-color:var(--grn);color:var(--bg)}
    .stp-line{width:32px;height:1px;background:var(--brd)}

    /* FLIGHT CARD */
    .f-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:20px 24px;margin-bottom:12px;transition:.2s;cursor:default}
    .f-card:hover{border-color:var(--brd-l);background:var(--card-h)}
    .f-top{display:flex;align-items:center;gap:16px;margin-bottom:14px}
    .f-logo{width:44px;height:44px;border-radius:10px;background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .f-logo img{width:36px;height:36px;object-fit:contain}
    .f-airline{flex:1}
    .f-airline-name{font-size:15px;font-weight:500}
    .f-flight-no{font-size:12px;color:var(--txt3);margin-top:2px}
    .f-badge{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500}
    .f-badge.direct{background:var(--grn-bg);color:var(--grn)}
    .f-badge.stop{background:rgba(234,179,8,.1);color:#EAB308}
    .f-seats{font-size:11px;color:var(--txt4);margin-left:8px}
    .f-mid{display:flex;align-items:center;gap:20px;margin-bottom:16px}
    .f-time{text-align:center}
    .f-time-val{font-size:22px;font-weight:600;letter-spacing:-.5px}
    .f-time-code{font-size:12px;color:var(--txt3);margin-top:2px}
    .f-route-line{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
    .f-dur{font-size:12px;color:var(--txt3)}
    .f-line{width:100%;height:1px;background:var(--brd);position:relative}
    .f-line::after{content:'✈';position:absolute;right:-4px;top:-8px;font-size:14px;color:var(--gold)}
    .f-date{font-size:12px;color:var(--txt3);margin-bottom:10px;font-weight:500}
    .f-program{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;margin-bottom:8px;background:rgba(212,175,55,0.15);color:var(--gold);border:1px solid rgba(212,175,55,0.3);letter-spacing:0.5px;text-transform:uppercase}
    .f-program.fb{background:rgba(0,100,200,0.15);color:#4da6ff;border-color:rgba(0,100,200,0.3)}
    .f-program.va{background:rgba(200,0,50,0.15);color:#ff6b6b;border-color:rgba(200,0,50,0.3)}
    .f-program.aa{background:rgba(0,150,100,0.15);color:#5cd6a0;border-color:rgba(0,150,100,0.3)}
    .f-segments{margin-bottom:14px;background:var(--bg);border-radius:10px;padding:12px 16px}
    .f-seg{display:flex;align-items:center;gap:14px;padding:6px 0}
    .f-seg + .f-seg{border-top:1px solid var(--brd);margin-top:6px;padding-top:10px}
    .f-seg-times{display:flex;align-items:center;gap:8px;min-width:120px}
    .f-seg-time{font-size:14px;font-weight:600}
    .f-seg-arrow{font-size:11px;color:var(--txt4)}
    .f-seg-detail{flex:1;font-size:12px;color:var(--txt3)}
    .f-seg-route{font-weight:500;color:var(--txt2)}
    .f-seg-info{font-size:11px;color:var(--txt4);margin-top:2px}
    .f-stop-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(234,179,8,.1);color:#EAB308;margin-left:8px}
    .f-prices{display:flex;gap:8px;flex-wrap:wrap}
    .f-price-btn{flex:1;min-width:120px;padding:10px 12px;border-radius:8px;border:1px solid var(--brd);background:var(--card2);cursor:pointer;transition:.2s;text-align:center}
    .f-price-btn:hover{border-color:var(--gold);background:rgba(184,148,95,.08)}
    .f-price-btn.sel{border-color:var(--gold);background:rgba(184,148,95,.15)}
    .f-price-btn.na{opacity:.3;cursor:not-allowed}
    .f-price-cabin{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .f-price-val{font-size:16px;font-weight:600;color:var(--gold)}
    .f-price-na{font-size:13px;color:var(--txt4)}

    /* SUMMARY */
    .summary{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:32px;margin-bottom:24px}
    .sum-title{font-size:20px;font-weight:500;margin-bottom:20px}
    .sum-flight{display:flex;gap:16px;align-items:center;padding:16px;background:var(--bg);border-radius:10px;margin-bottom:12px}
    .sum-dir{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px;width:60px}
    .sum-detail{flex:1}
    .sum-route{font-size:16px;font-weight:500}
    .sum-info{font-size:13px;color:var(--txt3);margin-top:4px}
    .sum-price{font-size:18px;font-weight:600;color:var(--gold)}
    .sum-total{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--brd);margin-top:8px}
    .sum-total-label{font-size:16px;color:var(--txt2)}
    .sum-total-val{font-size:28px;font-weight:600;color:var(--gold)}
    .btn-wa{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px;background:var(--wa);color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;margin-top:16px}
    .btn-wa:hover{background:#1da851;transform:translateY(-1px)}
    .btn-back{background:transparent;border:1px solid var(--brd);color:var(--txt3);padding:10px 20px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:12px;transition:.2s}
    .btn-back:hover{border-color:var(--txt3);color:var(--txt)}

    /* ERROR */
    .err-msg{text-align:center;padding:40px 20px}
    .err-msg h3{font-size:18px;margin-bottom:8px}
    .err-msg p{color:var(--txt3);font-size:14px}

    /* LOADING */
    .loading{text-align:center;padding:60px 20px}
    .spinner{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}} html{scroll-behavior:smooth} #results,#summaryWrap{scroll-margin-top:80px}
    .loading p{color:var(--txt3);font-size:14px}

    /* FOOTER */
    footer{text-align:center;padding:40px 20px;color:var(--txt4);font-size:13px;border-top:1px solid var(--brd);margin-top:60px}

    @media(max-width:768px){
      .s-row{grid-template-columns:1fr 1fr;gap:10px}
      .btn-s{grid-column:span 2}
      .f-mid{flex-wrap:wrap}
      .f-prices{flex-direction:column}
      .sum-flight{flex-direction:column;text-align:center}
    }
  
    /* Custom Calendar Datepicker */
    .date-display{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;color:var(--txt);font-family:inherit;font-size:14px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:space-between;user-select:none}
    .date-display:hover{border-color:var(--brd-l)}
    .date-display.active{border-color:var(--gold)}
    .date-display .dd-text{color:var(--txt)}
    .date-display .dd-placeholder{color:var(--txt4)}
    .date-display .dd-icon{color:var(--txt3);font-size:10px;flex-shrink:0;margin-left:8px}
    .cal-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--brd-l);border-radius:10px;margin-top:4px;z-index:200;display:none;box-shadow:0 16px 48px rgba(0,0,0,.5);padding:16px;min-width:280px}
    .cal-dropdown.show{display:block}
    .cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .cal-title{font-size:14px;font-weight:600;color:var(--txt);letter-spacing:.3px}
    .cal-nav{width:30px;height:30px;border-radius:8px;background:var(--card2);border:1px solid var(--brd);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;line-height:1}
    .cal-nav:hover{background:var(--card-h);border-color:var(--brd-l);color:var(--txt)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
    .cal-dow{font-size:10px;font-weight:600;color:var(--txt4);padding:6px 0;text-transform:uppercase;letter-spacing:.8px}
    .cal-day{font-size:13px;padding:8px 2px;border-radius:6px;cursor:pointer;color:var(--txt2);transition:.15s;font-weight:500}
    .cal-day:hover:not(.past):not(.empty){background:var(--card-h);color:var(--txt)}
    .cal-day.today{color:var(--gold);font-weight:700}
    .cal-day.selected{background:var(--gold)!important;color:var(--bg)!important;font-weight:700}
    .cal-day.other{color:var(--txt4);opacity:.35}
    .cal-day.past{color:var(--txt4);opacity:.25;cursor:default;pointer-events:none}
    .cal-day.empty{pointer-events:none}
    .cal-today-btn{display:block;width:100%;margin-top:10px;padding:8px;background:transparent;border:1px solid var(--brd);border-radius:8px;color:var(--gold);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;text-transform:uppercase;letter-spacing:.5px}
    .cal-today-btn:hover{background:var(--card2);border-color:var(--gold-d)}
  </style>
</head>
<body>
  <header><div class="h-in">
    <div class="logo"><div class="logo-icon">✈</div> <b>Élysian</b> Flights</div>
    <nav><a href="#search-section">Search</a><a href="#contact">Contact</a></nav>
  </div></header>

  <section class="hero">
    <div class="hero-tag">Premium Travel Concierge</div>
    <h1>Fly <em>Business &amp; First Class</em><br>at the best price</h1>
    <p>We book the best premium flights worldwide at competitive rates. Select your flight, we handle the rest.</p>
  </section>

  <div class="search-w" id="search-section">
    <div class="search-card">
      <div class="trip-tog">
        <button class="on" onclick="setTrip('oneway',this)">One way</button>
        <button onclick="setTrip('roundtrip',this)">Round trip</button>
      </div>
      <div class="s-row">
        <div class="fld" id="origWrap">
          <label>From</label>
          <input id="iOrig" autocomplete="off" placeholder="City or airport" value="" onfocus="openAP(this,'orig')" oninput="filterAP(this,'orig')">
          <div class="ap-dropdown" id="ddOrig"></div>
        </div>
        <div class="fld" id="destWrap">
          <label>To</label>
          <input id="iDest" autocomplete="off" placeholder="City or airport" value="" onfocus="openAP(this,'dest')" oninput="filterAP(this,'dest')">
          <div class="ap-dropdown" id="ddDest"></div>
        </div>
        <div class="fld"><label>Departure</label><div class="date-display" id="iDepDisplay" onclick="toggleCal('dep')"><span class="dd-placeholder">Pick date</span><span class="dd-icon">&#9662;</span></div><input type="hidden" id="iDep"><div class="cal-dropdown" id="calDep"></div></div>
        <div class="fld hidden" id="retFld"><label>Return</label><div class="date-display" id="iRetDisplay" onclick="toggleCal('ret')"><span class="dd-placeholder">Pick date</span><span class="dd-icon">&#9662;</span></div><input type="hidden" id="iRet"><div class="cal-dropdown" id="calRet"></div></div>
        <button class="btn-s" id="btnSearch" onclick="doSearch()">Search</button>
      </div>
    </div>
  </div>

  <div class="res-w hidden" id="results">
    <div id="stepsBar"></div>
    <div class="res-h"><h2 id="resTitle"></h2><span class="res-cnt" id="resCnt"></span></div>
    <div id="flightList"></div>
  </div>

  <div class="res-w hidden" id="summaryWrap">
    <div class="summary" id="summaryContent"></div>
  </div>

  <footer id="contact">&copy; 2026 Élysian Flights — Premium Travel Concierge</footer>

<script>
// ========== AIRPORT DATABASE ==========
const AIRPORTS=[

  {code:'SEA',name:'Seattle-Tacoma International',city:'Seattle',country:'United States',pop:.69},
  {code:'YYZ',name:'Toronto Pearson International',city:'Toronto',country:'Canada',pop:.68},
  {code:'PEK',name:'Beijing Capital International',city:'Beijing',country:'China',pop:.67},
  {code:'PVG',name:'Shanghai Pudong International',city:'Shanghai',country:'China',pop:.66},
  {code:'ICN',name:'Incheon International Airport',city:'Seoul',country:'South Korea',pop:.65},
  {code:'KUL',name:'Kuala Lumpur International',city:'Kuala Lumpur',country:'Malaysia',pop:.64},
  {code:'BOM',name:'Chhatrapati Shivaji Maharaj',city:'Mumbai',country:'India',pop:.63},
  {code:'DEL',name:'Indira Gandhi International',city:'Delhi',country:'India',pop:.62},
  {code:'DPS',name:'Ngurah Rai International',city:'Bali',country:'Indonesia',pop:.61},
  {code:'AUH',name:'Abu Dhabi International',city:'Abu Dhabi',country:'UAE',pop:.60},
  {code:'CAN',name:'Guangzhou Baiyun International',city:'Guangzhou',country:'China',pop:.59},
  {code:'GRU',name:'São Paulo–Guarulhos International',city:'São Paulo',country:'Brazil',pop:.58},

// ========== STATE ==========
let trip='oneway', step=1, selOrig=null, selDest=null;
let outFlights=[], retFlights=[], selOut=null, selRet=null, selOutCabin='', selRetCabin='';
let activeDD=null;

// ========== AIRPORT AUTOCOMPLETE ==========
function openAP(input, which) {
  const dd = document.getElementById(which==='orig'?'ddOrig':'ddDest');
  activeDD = which;
  const q = input.value.trim();
  renderAP(dd, q, which);
  dd.classList.add('show');
  // Close other dropdown
  const other = which==='orig'?'ddDest':'ddOrig';
  document.getElementById(other).classList.remove('show');
}

function filterAP(input, which) {
  const dd = document.getElementById(which==='orig'?'ddOrig':'ddDest');
  renderAP(dd, input.value.trim(), which);
  dd.classList.add('show');
}

function renderAP(dd, query, which) {
  let filtered;
  if (!query) {
    // Show popular airports
    filtered = AIRPORTS.slice(0, 10);
  } else {
    const q = query.toLowerCase();
    filtered = AIRPORTS.filter(a =>
      a.code.toLowerCase().includes(q) ||
      a.name.toLowerCase().includes(q) ||
      a.city.toLowerCase().includes(q) ||
      a.country.toLowerCase().includes(q)
    ).slice(0, 10);
  }

  dd.innerHTML = filtered.map((a, i) => `
    <div class="ap-item${i===0?' active':''}" onmousedown="selectAP('${which}','${a.code}','${a.city} (${a.code})')">
      <div class="ap-icon">✈</div>
      <div class="ap-info">
        <div class="ap-name">${a.name}</div>
        <div class="ap-city">${a.city}, ${a.country}</div>
      </div>
      <div class="ap-code">${a.code}</div>
    </div>
  `).join('');

  if (filtered.length === 0) {
    dd.innerHTML = '<div style="padding:16px;text-align:center;color:var(--txt4);font-size:13px">No airports found</div>';
  }
}

function selectAP(which, code, label) {
  const input = document.getElementById(which==='orig'?'iOrig':'iDest');
  input.value = label;
  if (which === 'orig') selOrig = code;
  else selDest = code;
  document.getElementById(which==='orig'?'ddOrig':'ddDest').classList.remove('show');
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('#origWrap')) document.getElementById('ddOrig').classList.remove('show');
  if (!e.target.closest('#destWrap')) document.getElementById('ddDest').classList.remove('show');
});

// Keyboard nav in dropdowns
document.addEventListener('keydown', function(e) {
  if (!activeDD) return;
  const dd = document.getElementById(activeDD==='orig'?'ddOrig':'ddDest');
  if (!dd.classList.contains('show')) return;
  const items = dd.querySelectorAll('.ap-item');
  if (!items.length) return;
  let idx = Array.from(items).findIndex(i => i.classList.contains('active'));
  if (e.key === 'ArrowDown') { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); }
  else if (e.key === 'Enter') { e.preventDefault(); if (idx >= 0) items[idx].dispatchEvent(new Event('mousedown')); return; }
  else if (e.key === 'Escape') { dd.classList.remove('show'); return; }
  else return;
  items.forEach(i => i.classList.remove('active'));
  if (items[idx]) { items[idx].classList.add('active'); items[idx].scrollIntoView({block:'nearest'}); }
});

// ========== TRIP TOGGLE ==========
function setTrip(t, btn) {
  trip = t;
  document.querySelectorAll('.trip-tog button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('retFld').classList.toggle('hidden', t === 'oneway');
}

// ========== SEARCH ==========
async function doSearch() {
  const o = selOrig;
  const d = selDest;
  const dep = document.getElementById('iDep').value;
  const ret = document.getElementById('iRet').value;

  if (!o || !d) { alert('Please select departure and destination airports'); return; }
  if (!dep) { alert('Please select a departure date'); return; }
  if (trip === 'roundtrip' && !ret) { alert('Please select a return date'); return; }

  document.getElementById('results').classList.remove('hidden');
  document.getElementById('summaryWrap').classList.add('hidden');
  document.getElementById('flightList').innerHTML = '<div class="loading"><div class="spinner"></div><p>Searching available flights...</p></div>';

  step = 1; selOut = null; selRet = null;
  updateSteps();
  document.getElementById('resTitle').innerHTML = `Flights <em>${o} → ${d}</em>`;
  document.getElementById('resCnt').textContent = '';

  try {
    const r = await fetch(`/api/search?origin=${o}&destination=${d}&date=${dep}`);
    const data = await r.json();
    outFlights = data.flights || [];
    document.getElementById('resCnt').textContent = `${outFlights.length} flights found`;
    renderFlights(outFlights, 'out');

    if (trip === 'roundtrip') {
      const r2 = await fetch(`/api/search?origin=${d}&destination=${o}&date=${ret}`);
      const data2 = await r2.json();
      retFlights = data2.flights || [];
    }
  } catch (e) {
    document.getElementById('flightList').innerHTML = `<div class="err-msg"><h3>Something went wrong</h3><p>${e.message}</p></div>`;
  }

  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}

// ========== RENDER ==========
function renderFlights(flights, dir) {
  const el = document.getElementById('flightList');
  if (!flights.length) { el.innerHTML = '<div class="err-msg"><h3>No flights found</h3><p>Try a different date or route.</p></div>'; return; }

  el.innerHTML = flights.map(f => {
    const al = AIRLINE_NAMES[f.airline] || f.airline;
    const logoUrl = CUSTOM_LOGOS[f.airline] || `https://pics.avs.io/60/60/${f.airline}.png`;
    const cabins = [
      {key:'premiumEconomy', label:'Premium Economy', avail:f.availability.premiumEconomy, price:f.prices.premiumEconomy},
      {key:'business', label:'Business', avail:f.availability.business, price:f.prices.business},
      {key:'first', label:'First Class', avail:f.availability.first, price:f.prices.first}
    ];
    const stopsText = f.direct ? 'Direct' : (f.stops === 1 ? '1 Stop' : (f.stops || 1) + ' Stops');
    const dateStr = f.date ? new Date(f.date + 'T00:00:00').toLocaleDateString('en-US', {weekday:'short', day:'numeric', month:'long', year:'numeric'}) : '';
    // Build segments HTML
    let segHtml = '';
    if (f.segments && f.segments.length > 0) {
      segHtml = `<div class="f-segments">${f.segments.map(s => `<div class="f-seg">
        <div class="f-seg-times"><span class="f-seg-time">${s.depTime || '--:--'}</span><span class="f-seg-arrow">→</span><span class="f-seg-time">${s.arrTime || '--:--'}</span></div>
        <div class="f-seg-detail"><div class="f-seg-route">${s.origin} → ${s.destination} <span style="color:var(--txt4);font-weight:400">${s.flightNo}</span></div>
        <div class="f-seg-info">${s.duration ? s.duration : ''}${s.aircraft ? ' · ' + s.aircraft : ''}</div></div>
      </div>`).join('')}</div>`;
    }
    return `<div class="f-card">
      ${dateStr ? `<div class="f-date">${dateStr}</div>` : ''}
      <div class="f-top">
        <div class="f-logo"><img src="${logoUrl}" alt="${al}" onerror="this.style.display='none';this.parentElement.textContent='${f.airline}'"></div>
        <div class="f-airline"><div class="f-airline-name">${al}</div><div class="f-flight-no">${f.flightNo}</div></div>
        <span class="f-badge ${f.direct?'direct':'stop'}">${stopsText}</span>
        <span class="f-seats">${f.remainingSeats} ${f.remainingSeats===1?'seat':'seats'} left</span>
      </div>
      <div class="f-mid">
        <div class="f-time"><div class="f-time-val">${f.depTime || '--:--'}</div><div class="f-time-code">${f.origin}</div></div>
        <div class="f-route-line"><div class="f-dur">${f.duration ? (Number(f.duration) > 0 && !f.duration.toString().includes("h") ? Math.floor(Number(f.duration)/60) + "h " + String(Number(f.duration)%60).padStart(2,"0") + "m" : f.duration) : ""}${!f.direct && f.segments && f.segments.length > 1 ? " · via " + f.segments.slice(0,-1).map(s => s.destination).join(", ") : ""}</div><div class="f-line"></div></div>
        <div class="f-time"><div class="f-time-val">${f.arrTime || '--:--'}</div><div class="f-time-code">${f.destination}</div></div>
      </div>
      <div class="f-prices">
        ${cabins.map(c => c.avail && c.price
          ? `<div class="f-price-btn" onclick="pickFlight('${dir}','${f.id}','${c.key}',${c.price})"><div class="f-price-cabin">${c.label}</div><div class="f-price-val">€${c.price.toLocaleString()}</div></div>`
          : `<div class="f-price-btn na"><div class="f-price-cabin">${c.label}</div><div class="f-price-na">${c.avail ? 'On request' : 'Not available'}</div></div>`
        ).join('')}
      </div>
    </div>`;
  }).join('');
}

function pickFlight(dir, id, cabin, price) {
  if (dir === 'out') {
    selOut = outFlights.find(f => f.id === id);
    selOutCabin = cabin;
    selOut._price = price;
    step = 2;
    if (trip === 'roundtrip') {
      updateSteps();
      document.getElementById('resTitle').innerHTML = `Return flights <em>${selOut.destination} → ${selOut.origin}</em>`;
      document.getElementById('resCnt').textContent = `${retFlights.length} flights found`;
      renderFlights(retFlights, 'ret');
      document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
    } else {
      showSummary();
    }
  } else {
    selRet = retFlights.find(f => f.id === id);
    selRetCabin = cabin;
    selRet._price = price;
    step = 3;
    showSummary();
  }
}

function updateSteps() {
  const s = document.getElementById('stepsBar');
  const steps = [
    {n:1, label:'Outbound'},
    {n:2, label:'Return'},
    {n:3, label:'Summary'}
  ];
  if (trip==='oneway') steps.splice(1,1);
    steps.forEach((s,i) => s.n = i+1);
  s.innerHTML = '<div class="steps">' + steps.map((st,i) => {
    const cls = step > st.n ? 'done' : step === st.n ? 'on' : '';
    return `${i>0?'<div class="stp-line"></div>':''}<div class="stp ${cls}"><div class="stp-num">${step > st.n ? '✓' : st.n}</div>${st.label}</div>`;
  }).join('') + '</div>';
}

function showSummary() {
  document.getElementById('results').classList.add('hidden');
  document.getElementById('summaryWrap').classList.remove('hidden');
  step = trip === 'oneway' ? 2 : 3;
  updateSteps();
  const cabinLabel = {business:'Business Class',first:'First Class',premiumEconomy:'Premium Economy'};
  function fmtDur(d) {
    if (!d) return '';
    if (typeof d === 'number' || (typeof d === 'string' && !d.includes('h'))) {
      const m = Number(d); return Math.floor(m/60) + 'h ' + String(m%60).padStart(2,'0') + 'm';
    }
    return d;
  }
  function flightCard(f, cabin, dirLabel) {
    const al = AIRLINE_NAMES[f.airline] || f.airline;
    const logoUrl = 'https://pics.avs.io/60/60/' + f.airline + '.png';
    const dateStr = f.date ? new Date(f.date + 'T00:00:00').toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : '';
    const dur = fmtDur(f.duration);
    const stopsText = f.direct ? 'Direct flight' : (f.stops === 1 ? '1 stop' : (f.stops || 1) + ' stops');
    const layover = !f.direct && f.segments && f.segments.length > 1 ? ' via ' + f.segments.slice(0,-1).map(s => s.destination).join(', ') : '';
    let aircraft = '';
    if (f.segments && f.segments.length > 0) {
      const types = [...new Set(f.segments.map(s => s.aircraft).filter(Boolean))];
      if (types.length) aircraft = types.join(', ');
    }
    let segHtml = '';
    if (f.segments && f.segments.length > 1) {
      segHtml = '<div style="margin-top:14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 16px">';
      segHtml += '<div style="font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Flight segments</div>';
      f.segments.forEach((s, i) => {
        if (i > 0) segHtml += '<div style="padding:6px 0 6px 16px;font-size:11px;color:var(--gold);border-left:2px dashed var(--brd);margin-left:6px">Layover in ' + s.origin + '</div>';
        segHtml += '<div style="display:flex;align-items:center;gap:14px;padding:8px 0;' + (i > 0 ? 'border-top:1px solid var(--brd);' : '') + '">';
        segHtml += '<div style="min-width:110px"><span style="font-size:14px;font-weight:600">' + (s.depTime||'') + '</span> <span style="color:var(--txt4);font-size:11px">&rarr;</span> <span style="font-size:14px;font-weight:600">' + (s.arrTime||'') + '</span></div>';
        segHtml += '<div style="flex:1"><div style="font-size:13px;font-weight:500">' + s.origin + ' &rarr; ' + s.destination + ' <span style="color:var(--txt4);font-weight:400;font-size:12px">' + (s.flightNo||'') + '</span></div>';
        segHtml += '<div style="font-size:12px;color:var(--txt3);margin-top:2px">' + [s.duration||'', s.aircraft||''].filter(Boolean).join(' &middot; ') + '</div></div></div>';
      });
      segHtml += '</div>';
    }
    return '<div style="padding:20px;background:var(--bg);border-radius:12px;margin-bottom:12px">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      + '<div style="font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px">' + dirLabel + '</div>'
      + '<div style="font-size:22px;font-weight:600;color:var(--gold)">&euro;' + f._price.toLocaleString() + '</div></div>'
      + '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
      + '<div style="width:44px;height:44px;border-radius:10px;background:var(--card2);overflow:hidden;display:flex;align-items:center;justify-content:center">'
      + '<img src="' + logoUrl + '" alt="' + al + '" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + f.airline + '\'">'
      + '</div><div><div style="font-size:16px;font-weight:500">' + al + '</div>'
      + '<div style="font-size:12px;color:var(--txt3)">' + f.flightNo + '</div></div></div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:16px;padding:14px;background:var(--card);border-radius:10px;border:1px solid var(--brd)">'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Route</div><div style="font-size:14px;font-weight:500">' + f.origin + ' &rarr; ' + f.destination + '</div></div>'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Date</div><div style="font-size:14px">' + dateStr + '</div></div>'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Time</div><div style="font-size:14px;font-weight:500">' + (f.depTime||'') + ' &ndash; ' + (f.arrTime||'') + '</div></div>'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Duration</div><div style="font-size:14px">' + dur + '</div></div>'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Cabin</div><div style="font-size:14px">' + cabinLabel[cabin] + '</div></div>'
      + '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Stops</div><div style="font-size:14px">' + stopsText + layover + '</div></div>'
      + (aircraft ? '<div><div style="font-size:10px;font-weight:600;color:var(--txt4);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Aircraft</div><div style="font-size:14px">' + aircraft + '</div></div>' : '')
      + '</div>'
      + segHtml
      + '</div>';
  }
  let total = selOut._price;
  let html = '<div class="sum-title">Your selection</div>';
  html += flightCard(selOut, selOutCabin, 'Outbound');
  if (selRet) { total += selRet._price; html += flightCard(selRet, selRetCabin, 'Return'); }
  html += '<div class="sum-total"><div class="sum-total-label">Total per person</div><div class="sum-total-val">&euro;' + total.toLocaleString() + '</div></div>';
  const alOut = AIRLINE_NAMES[selOut.airline] || selOut.airline;
  let msg = 'Hello! I would like to book the following flight(s) via Elysian Flights:\n\n';
  msg += 'OUTBOUND: ' + selOut.origin + ' > ' + selOut.destination + '\n';
  msg += alOut + ' ' + selOut.flightNo + ' | ' + selOut.date + ' | ' + selOut.depTime + '-' + selOut.arrTime + '\n';
  msg += 'Cabin: ' + cabinLabel[selOutCabin] + ' | Price: EUR' + selOut._price.toLocaleString() + '\n';
  if (selRet) {
    const alRet = AIRLINE_NAMES[selRet.airline] || selRet.airline;
    msg += '\nRETURN: ' + selRet.origin + ' > ' + selRet.destination + '\n';
    msg += alRet + ' ' + selRet.flightNo + ' | ' + selRet.date + ' | ' + selRet.depTime + '-' + selRet.arrTime + '\n';
    msg += 'Cabin: ' + cabinLabel[selRetCabin] + ' | Price: EUR' + selRet._price.toLocaleString() + '\n';
  }
  msg += '\nTotal: EUR' + total.toLocaleString() + '\n\nI would like to receive a confirmation. Thank you!';
  const waUrl = 'https://wa.me/31639027470?text=' + encodeURIComponent(msg);
  html += '<button class="btn-wa" onclick="window.open(\'' + waUrl + '\',\'_blank\')">';
  html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.61.609l4.458-1.495A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.325 0-4.47-.744-6.227-2.01a.5.5 0 00-.395-.084l-3.16 1.06 1.06-3.16a.5.5 0 00-.084-.396A9.935 9.935 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>';
  html += ' Book via WhatsApp</button>';
  html += '<button class="btn-back" onclick="backToSearch()">&#8592; Back to search results</button>';
  document.getElementById('summaryContent').innerHTML = html;
  document.getElementById('summaryWrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function backToSearch() {
  document.getElementById('summaryWrap').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  step = 1; selOut = null; selRet = null;
  updateSteps();
  document.getElementById('resTitle').innerHTML = `Flights <em>${selOrig} → ${selDest}</em>`;
  document.getElementById('resCnt').textContent = `${outFlights.length} flights found`;
  renderFlights(outFlights, 'out');
}

// Set default date to tomorrow
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 7);
document.getElementById('iDep').value = tomorrow.toISOString().slice(0,10);
if (trip === 'roundtrip') {
  const ret = new Date(tomorrow);
  ret.setDate(ret.getDate() + 7);
  document.getElementById('iRet').value = ret.toISOString().slice(0,10);
}
</script>
<script>
// === Custom Calendar Datepicker ===
const calState={dep:{month:null,year:null},ret:{month:null,year:null}};
const MONTHS_NL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_NL=['Mo','Tu','We','Th','Fr','Sa','Su'];

function initCalDate(w){const n=new Date();if(!calState[w].month&&calState[w].month!==0){calState[w].month=n.getMonth();calState[w].year=n.getFullYear();}}

function toggleCal(w){
  const dd=document.getElementById(w==='dep'?'calDep':'calRet');
  const ds=document.getElementById(w==='dep'?'iDepDisplay':'iRetDisplay');
  const isOpen=dd.classList.contains('show');
  document.querySelectorAll('.cal-dropdown').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.date-display').forEach(d=>d.classList.remove('active'));
  document.querySelectorAll('.ap-dropdown').forEach(d=>d.classList.remove('show'));
  if(!isOpen){initCalDate(w);renderCal(w);dd.classList.add('show');ds.classList.add('active');}
}

function renderCal(w){
  const st=calState[w];
  const dd=document.getElementById(w==='dep'?'calDep':'calRet');
  const today=new Date();today.setHours(0,0,0,0);
  const sv=document.getElementById(w==='dep'?'iDep':'iRet').value;
  const sd=sv?new Date(sv+'T00:00:00'):null;
  const first=new Date(st.year,st.month,1);
  const last=new Date(st.year,st.month+1,0);
  let dow=first.getDay();dow=dow===0?6:dow-1;
  let h='<div class="cal-hdr">';
  h+='<button type="button" class="cal-nav" onclick="event.stopPropagation();navCal(\''+w+'\', -1)">&lsaquo;</button>';
  h+='<span class="cal-title">'+MONTHS_NL[st.month]+' '+st.year+'</span>';
  h+='<button type="button" class="cal-nav" onclick="event.stopPropagation();navCal(\''+w+'\', 1)">&rsaquo;</button>';
  h+='</div><div class="cal-grid">';
  DAYS_NL.forEach(d=>{h+='<div class="cal-dow">'+d+'</div>';});
  for(let i=0;i<dow;i++)h+='<div class="cal-day empty"></div>';
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(st.year,st.month,d);
    let c='cal-day';
    if(dt<today)c+=' past';
    if(dt.getTime()===today.getTime())c+=' today';
    if(sd&&dt.getTime()===sd.getTime())c+=' selected';
    const ds=st.year+'-'+String(st.month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if(dt>=today){h+='<div class="'+c+'" onclick="event.stopPropagation();pickDate(\''+w+'\',\''+ds+'\')">'+d+'</div>';}
    else{h+='<div class="'+c+'">'+d+'</div>';}
  }
  h+='</div>';
  h+='<button type="button" class="cal-today-btn" onclick="event.stopPropagation();pickDate(\''+w+'\',\''+fmtISO(today)+'\')">Today</button>';
  dd.innerHTML=h;
}
</script>
<script>
function navCal(w,dir){
  const st=calState[w];st.month+=dir;
  if(st.month<0){st.month=11;st.year--;}
  if(st.month>11){st.month=0;st.year++;}
  renderCal(w);
}

function pickDate(w,dateStr){
  const inp=document.getElementById(w==='dep'?'iDep':'iRet');
  const ds=document.getElementById(w==='dep'?'iDepDisplay':'iRetDisplay');
  const dd=document.getElementById(w==='dep'?'calDep':'calRet');
  inp.value=dateStr;
  const p=dateStr.split('-');
  const d=parseInt(p[2]),m=parseInt(p[1])-1,y=parseInt(p[0]);
  const fmt=d+' '+MONTHS_SHORT[m]+' '+y;
  ds.innerHTML='<span class="dd-text">'+fmt+'</span><span class="dd-icon">&#9662;</span>';
  ds.classList.remove('active');dd.classList.remove('show');
  if(w==='dep'){
    const ri=document.getElementById('iRet');
    if(!ri.value){const rd=new Date(y,m,d+7);pickDate('ret',fmtISO(rd));}
    calState.ret.month=m;calState.ret.year=y;
  }
}

function fmtISO(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}

document.addEventListener('click',function(e){
  if(!e.target.closest('.fld')&&!e.target.closest('.cal-dropdown')){
    document.querySelectorAll('.cal-dropdown').forEach(d=>d.classList.remove('show'));
    document.querySelectorAll('.date-display').forEach(d=>d.classList.remove('active'));
  }
});

(function(){
  const now=new Date();
  const dep=new Date(now);dep.setDate(dep.getDate()+7);
  const ret=new Date(dep);ret.setDate(ret.getDate()+7);
  pickDate('dep',fmtISO(dep));
  pickDate('ret',fmtISO(ret));
})();
</script>
</body>
